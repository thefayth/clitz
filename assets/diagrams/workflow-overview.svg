<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="440" viewBox="0 0 1280 440" role="img" aria-labelledby="title desc">
  <title id="title">CLITZ workflow overview</title>
  <desc id="desc">Public submissions move into pending review, moderator queue, verifier decision, public cards, held records, reports, and audit logs.</desc>
  <style>
    .bg{fill:#111827}
    .card{fill:#fff7ed;stroke:#ef476f;stroke-width:3;rx:18}
    .audit{fill:#ecfeff;stroke:#06b6d4;stroke-width:3;rx:18}
    .text{font-family:Arial,Helvetica,sans-serif;font-size:22px;font-weight:700;fill:#111827}
    .small{font-family:Arial,Helvetica,sans-serif;font-size:18px;fill:#374151}
    .arrow{stroke:#fbbf24;stroke-width:5;fill:none;marker-end:url(#arrow)}
  </style>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#fbbf24"/>
    </marker>
  </defs>
  <rect class="bg" width="1280" height="440"/>
  <rect class="card" x="40" y="80" width="180" height="92"/>
  <text class="text" x="66" y="118">Public</text>
  <text class="small" x="66" y="146">submission</text>
  <rect class="card" x="270" y="80" width="180" height="92"/>
  <text class="text" x="303" y="118">Pending</text>
  <text class="small" x="303" y="146">review</text>
  <rect class="card" x="500" y="80" width="190" height="92"/>
  <text class="text" x="528" y="118">Moderator</text>
  <text class="small" x="528" y="146">queue</text>
  <rect class="card" x="750" y="80" width="190" height="92"/>
  <text class="text" x="778" y="118">Verifier</text>
  <text class="small" x="778" y="146">decision</text>
  <rect class="card" x="1000" y="36" width="220" height="92"/>
  <text class="text" x="1032" y="74">Published</text>
  <text class="small" x="1032" y="102">card or marker</text>
  <rect class="card" x="1000" y="184" width="220" height="92"/>
  <text class="text" x="1032" y="222">Held</text>
  <text class="small" x="1032" y="250">or disputed</text>
  <rect class="audit" x="500" y="284" width="220" height="92"/>
  <text class="text" x="530" y="322">Audit event</text>
  <text class="small" x="530" y="350">and source log</text>
  <path class="arrow" d="M220 126 H270"/>
  <path class="arrow" d="M450 126 H500"/>
  <path class="arrow" d="M690 126 H750"/>
  <path class="arrow" d="M940 126 C960 126 970 86 1000 82"/>
  <path class="arrow" d="M940 126 C960 126 970 226 1000 230"/>
  <path class="arrow" d="M595 172 V284"/>
  <path class="arrow" d="M1110 128 C1128 336 760 338 720 330"/>
  <text class="small" x="790" y="342">reports and updates return to review</text>
</svg>

